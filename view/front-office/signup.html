<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign up</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="container py-5">
    <h2 class="mb-4">Sign up</h2>

    <form method="POST" action="../../controllers/front-office/signup.php">
        <div class="mb-3">
            <label>Full Name (Nom)</label>
            <input type="text" name="nom" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Email (Adresse)</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="d-flex mb-3">
            <button type="submit" class="btn btn-primary me-2">Create Account</button>
            <a href="login.php" class="btn btn-outline-secondary me-2">Back to Login</a>
            <a href="index.html" class="btn btn-outline-secondary">Back to Home</a>
        </div>
    </form>
</body>
</html>
