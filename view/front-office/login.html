<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('error')) {
                document.getElementById('error-message').textContent = 'Invalid email or password.';
            }
        }
    </script>
</head>
<body class="container py-5">
    <h2 class="mb-4">Login</h2>
    <p id="error-message" class="text-danger"></p>

    <form method="POST" action="../../controllers/front-office/login.php">
        <div class="mb-3">
            <label>Email (Adresse)</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="d-flex mb-3">
            <button type="submit" class="btn btn-primary me-2">Log in</button>
            <a href="signup.html" class="btn btn-outline-secondary me-2">Sign up</a>
            <a href="index.html" class="btn btn-outline-secondary">Back to Home</a>
        </div>
    </form>
</body>
</html>
